name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          args: --check .

  luacheck:
    name: luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"
      - uses: leafo/gh-actions-luarocks@v4
      - run: luarocks install luacheck
      - run: luacheck lua snippets ftdetect

  test:
    name: test (${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}
      - name: Fetch LuaSnip (optional dependency)
        run: git clone --depth 1 https://github.com/L3MON4D3/LuaSnip .deps/LuaSnip
      - name: Headless smoke test
        run: nvim --headless --noplugin -u NONE -l scripts/ci_smoke.lua

  docs:
    name: helptags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Generate helptags (validates doc/bazel-nvim.txt)
        run: nvim --headless --noplugin -u NONE -c "helptags doc" -c "qa!"
